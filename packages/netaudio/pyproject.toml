[project]
name = "netaudio"
version = "0.1.2"
description = "CLI for controlling Audinate Dante network audio devices"
readme = "README.md"
license = "Unlicense"
requires-python = ">=3.9"
authors = [{ name = "Christopher Ritsen", email = "chris.ritsen@gmail.com" }]
keywords = ["audinate", "audio", "cli", "dante", "network"]
dependencies = [
    "netaudio-lib",
    "typer>=0.15.0",
    "rich>=13.0.0",
    "redis>=5.0.0",
]

[project.scripts]
netaudio = "netaudio.cli:main"

[project.urls]
Repository = "https://github.com/chris-ritsen/network-audio-controller"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/netaudio"]
